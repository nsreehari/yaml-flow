# Portfolio Tracker board.yaml
name: Portfolio Tracker
desc: Live portfolio tracking — manage stock holdings and fetch market prices from Yahoo Finance

connects:
  - id: yahoo-finance
    type: http
    url: https://query1.finance.yahoo.com/v8/finance/quote
    desc: Yahoo Finance v8 quote API

vocabulary:
  tokens:
    up:   { color: "green",     label: "Up" }
    down: { color: "red",       label: "Down" }
    flat: { color: "secondary", label: "Flat" }
