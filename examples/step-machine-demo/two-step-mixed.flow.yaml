id: two-step-mixed
settings:
  start_step: step1_add
  max_total_steps: 10
  timeout_ms: 10000

steps:
  step1_add:
    description: Inline handler computes c = a + b
    expects_data: [a, b]
    produces_data: [c, e]
    handler:
      inline: step1_add
    transitions:
      success: step2_double
      failure: failed_state

  step2_double:
    description: CLI handler computes d = c * 2
    expects_data: [c]
    produces_data: [d, e]
    handler:
      cli: node ./step2-double-cli.js
    transitions:
      success: success_state
      failure: failed_state

terminal_states:
  success_state:
    return_intent: success
    return_artifacts: [a, b, c, d, e, error]

  failed_state:
    return_intent: failure
    return_artifacts: [error]
