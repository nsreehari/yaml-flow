      <p>Canonical command reference for board runtime initialization, card lifecycle operations, source execution, and status contracts.</p>

    <section class="card">
      <h2>Invocation</h2>
      <pre><code>board-live-cards-cli &lt;command&gt; [options]</code></pre>
      <p class="muted">Equivalent repo wrapper usage: <code>node board-live-cards-cli.js &lt;command&gt;</code></p>
    </section>

    <section class="card">
      <h2>Commands</h2>
      <table>
        <thead>
          <tr><th>Command</th><th>Purpose</th><th>Example</th></tr>
        </thead>
        <tbody>
          <tr><td><code>init &lt;dir&gt; [--task-executor &lt;script&gt;]</code></td><td>Create or reinitialize a board runtime directory.</td><td><code>board-live-cards-cli init ./my-board</code></td></tr>
          <tr><td><code>status --rg &lt;dir&gt; [--json]</code></td><td>Print human status or machine-readable status object.</td><td><code>board-live-cards-cli status --rg ./my-board --json</code></td></tr>
          <tr><td><code>add-cards --rg &lt;dir&gt; (--card &lt;file&gt; | --card-glob &lt;glob&gt;)</code></td><td>Add one or many card JSON files to the board.</td><td><code>board-live-cards-cli add-cards --rg ./my-board --card-glob "cards/*.json"</code></td></tr>
          <tr><td><code>update-card --rg &lt;dir&gt; --card-id &lt;id&gt; [--restart]</code></td><td>Reload card JSON from disk and update task config.</td><td><code>board-live-cards-cli update-card --rg ./my-board --card-id portfolio-form --restart</code></td></tr>
          <tr><td><code>remove-card --rg &lt;dir&gt; --id &lt;id&gt;</code></td><td>Remove a card/task from the board.</td><td><code>board-live-cards-cli remove-card --rg ./my-board --id portfolio-form</code></td></tr>
          <tr><td><code>retrigger --rg &lt;dir&gt; --task &lt;name&gt;</code></td><td>Mark task as not-started and schedule reevaluation.</td><td><code>board-live-cards-cli retrigger --rg ./my-board --task price-fetch</code></td></tr>
          <tr><td><code>task-completed --token &lt;token&gt; [--data &lt;json&gt;]</code></td><td>Task callback for successful completion.</td><td><code>board-live-cards-cli task-completed --token TOKEN --data '{"x":1}'</code></td></tr>
          <tr><td><code>task-failed --token &lt;token&gt; [--error &lt;msg&gt;]</code></td><td>Task callback for failure.</td><td><code>board-live-cards-cli task-failed --token TOKEN --error "timeout"</code></td></tr>
          <tr><td><code>run-sources --card &lt;file&gt; --token &lt;token&gt; --rg &lt;dir&gt;</code></td><td>Execute card source entries and report delivery/failure.</td><td><code>board-live-cards-cli run-sources --card cards/price-fetch.json --token TOKEN --rg ./my-board</code></td></tr>

    <section class="card">
      <h2>LiveCard JSON Structure</h2>
      <p>Each card is a JSON file that declares dependencies, data sources, and computed outputs:</p>
      <pre><code>{
  "id": "portfolio-value",
  "meta": { "title": "Portfolio Valuation" },
  "requires": ["holdings", "prices"],
  "provides": [{ "bindTo": "total_value", "src": "computed_values.value" }],
  "state": { "initial_data": 100 },
  "sources": [
    { "cli": "node fetch-market.js", "bindTo": "market", "outputFile": "market.json" }
  ],
  "compute": [
    { "bindTo": "value", "expr": "$sum(requires.holdings.(qty * $lookup(requires.prices, symbol).price))" }
  ],
  "view": {
    "elements": [
      { "kind": "metric", "label": "Total Value", "data": { "bind": "computed_values.value" } }
    ]
  }
}</code></pre>
      <p><strong>Key fields:</strong></p>
      <ul style="margin: 8px 0 0 18px;">
        <li><code>id</code>: unique card identifier (becomes a task in the board graph).</li>
        <li><code>requires</code>: array of token names that must be available before this card runs.</li>
        <li><code>provides</code>: expressions that bind card outputs to tokens for downstream cards; uses JSONata <code>src</code>.</li>
        <li><code>state</code>: initial data object available during compute as <code>state.*</code>.</li>
        <li><code>sources</code>: external CLI commands to fetch or compute data; results available as <code>sources.*</code>.</li>
        <li><code>compute</code>: JSONata expressions that derive new values from state, requires, sources, and earlier compute results.</li>
      </ul>
    </section>

    <section class="card">
      <h2>Understanding JSONata in LiveCards</h2>
      <p><strong>JSONata</strong> is a lightweight query and transformation language for JSON. In card <code>compute</code> steps and <code>provides[].src</code>, you write JSONata expressions that transform data:</p>
      <pre><code>// Access state properties
"state.price"

// Array operations
"$sum(state.quantities)"
"$average(requires.history.values)"

// Conditional logic
"state.quantity > 100 ? state.quantity * 0.9 : state.quantity"

// Lookup and grouping
"$lookup(requires.prices, symbol).price"
"requires.transactions{category: [$sum(amount)]}"

// Multi-step chains (access previous compute results)
"computed_values.subtotal * computed_values.discount_factor"</code></pre>
      <p class="muted">Learn more at <a href="https://jsonata.org" target="_blank">jsonata.org</a></p>
    </section>

    <section class="card">
      <h2>Composition Patterns</h2>
      <p><strong>Sequential Data Flow:</strong> Cards depend on tokens provided by upstream cards. The board scheduler ensures dependencies are satisfied.</p>
      <pre><code>holdings (card) —[provides: holdings]—&gt; portfolio-value (requires: holdings)</code></pre>
      <p><strong>Compute Chaining:</strong> Later compute steps in a single card can reference results from earlier steps via <code>computed_values.*</code>:</p>
      <pre><code>"compute": [
  { "bindTo": "subtotal", "expr": "$sum(state.items.price)" },
  { "bindTo": "tax", "expr": "computed_values.subtotal * 0.1" },
  { "bindTo": "total", "expr": "computed_values.subtotal + computed_values.tax" }
]</code></pre>
      <p><strong>Source Output Binding:</strong> CLI sources write JSON or text to <code>outputFile</code>. Use <code>provides</code> to expose the result as a token:</p>
      <pre><code>"sources": [{ "cli": "node fetch-prices.js", "bindTo": "prices", "outputFile": "prices.json" }],
"provides": [{ "bindTo": "prices", "src": "sources.prices" }]</code></pre>
    </section>

    <section class="card">
      <h2>Card Composition Checklist</h2>
      <ul>
        <li><strong>Declare requires:</strong> Name all token dependencies explicitly.</li>
        <li><strong>Use provides for outputs:</strong> Even leaf cards should declare what they provide to downstream consumers.</li>
        <li><strong>Keep compute expressions simple:</strong> Test each JSONata expression in isolation if possible.</li>
        <li><strong>Optional sources:</strong> Set <code>optional: true</code> for sources that may fail gracefully.</li>
        <li><strong>Timeout sources:</strong> Set <code>timeout</code> (ms) for long-running CLIs.</li>
        <li><strong>Test with status --json:</strong> Verify card state and topology before running the full board.</li>
      </ul>
    </section>

    <section class="card">
      <h2>Source Execution Notes</h2>
      <ul>
        <li><code>source.cli</code> is parsed with quote-aware argument splitting and executed without shell wrapping.</li>
        <li>Stdout is captured and written to source output artifacts (filepath: boardDir/cardId/bindTo.json or .txt).</li>
        <li>Timeout defaults to 120s unless overridden by <code>source.timeout</code>.</li>
        <li>Failed sources block the card unless marked <code>optional: true</code>.</li>
      </ul>
    </section>

    <section class="card">
      <h2>Example: Multi-Card Portfolio Workflow</h2>
      <pre><code>// cards/holdings.json
{
  "id": "holdings",
  "state": { "portfolio": [{ "symbol": "AAPL", "qty": 10 }] },
  "provides": [{ "bindTo": "holdings", "src": "state.portfolio" }]
}

// cards/price-fetch.json
{
  "id": "price-fetch",
  "requires": ["holdings"],
  "sources": [{ "cli": "node fetch-prices.js", "bindTo": "prices", "outputFile": "prices.json" }],
  "provides": [{ "bindTo": "prices", "src": "sources.prices" }]
}

// cards/portfolio-value.json
{
  "id": "portfolio-value",
  "requires": ["holdings", "prices"],
  "compute": [
    { "bindTo": "total", "expr": "$sum(requires.holdings.(qty * requires.prices[symbol].price))" }
  ],
  "provides": [{ "bindTo": "portfolio_value", "src": "computed_values.total" }]
}</code></pre>
